service: nest-next-aws-todolist-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-central-1
  stage: dev

  environment:
    DYNAMODB_TODOS_TABLE: Todos
    S3_DOCUMENTS_BUCKET: nest-next-aws-todolist-documents-vetal
    COGNITO_USER_POOL_ID: eu-central-1_t1TkLwpWx
    COGNITO_ISSUER: https://cognito-idp.eu-central-1.amazonaws.com/eu-central-1_t1TkLwpWx
    COGNITO_CLIENT_ID: 7o1pnop19cf3ojn9jtcp2r8vnb
    COGNITO_REGION: eu-central-1

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource:
            - arn:aws:dynamodb:eu-central-1:*:table/Todos
            - arn:aws:dynamodb:eu-central-1:*:table/Todos/index/TodosByCreatedAtIndex

        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:ListBucket
            - s3:DeleteObject
            - s3:DeleteObjects
          Resource:
            - arn:aws:s3:::nest-next-aws-todolist-documents-vetal
            - arn:aws:s3:::nest-next-aws-todolist-documents-vetal/*

functions:
  api:
    handler: dist/lambdas/api/lambda.handler
    events:
      - httpApi:
          path: /
          method: '*'
      - httpApi:
          path: /{proxy+}
          method: '*'

  imageOptimizer:
    handler: dist/lambdas/image-optimizer/handler.handler
    events:
      - s3:
          bucket: nest-next-aws-todolist-documents-vetal
          event: s3:ObjectCreated:*
          existing: true

resources:
  - Resources:
      TodosTable:
        Type: AWS::DynamoDB::Table
        Properties:
          TableName: Todos
          BillingMode: PAY_PER_REQUEST
          AttributeDefinitions:
            - AttributeName: id
              AttributeType: S
            - AttributeName: entityType
              AttributeType: S
            - AttributeName: createdAt
              AttributeType: S
          KeySchema:
            - AttributeName: id
              KeyType: HASH
          GlobalSecondaryIndexes:
            - IndexName: TodosByCreatedAtIndex
              KeySchema:
                - AttributeName: entityType
                  KeyType: HASH
                - AttributeName: createdAt
                  KeyType: RANGE
              Projection:
                ProjectionType: ALL

plugins:
  - serverless-offline